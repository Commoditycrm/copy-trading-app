name: Build and Test All Branches

on:
  push:
    branches-ignore:
      - main
      - qa-branch
  pull_request:
    branches-ignore:
      - main
      - qa-branch
  workflow_dispatch: {}

concurrency:
  group: build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate Code + Build Docker
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show branch
        run: |
          echo "Running build for branch: ${{ github.ref_name }}"

      # Backend setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check backend code
        working-directory: ./backend
        run: |
          python -m compileall .

      # Frontend setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm install

      - name: Check frontend lint
        working-directory: ./frontend
        run: |
          npm run lint

      - name: Build frontend code
        working-directory: ./frontend
        run: |
          npm run build

      # Docker build
      - name: Build Docker images
        run: |
          docker compose build backend frontend

      # Optional: test containers
      - name: Start containers
        run: |
          docker compose up -d --remove-orphans

      - name: Health check
        run: |
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS --max-time 3 http://localhost/api/health > /tmp/health.json; then
              ok=1
              break
            fi
            sleep 2
          done

          if [ "$ok" -ne 1 ]; then
            echo "Health check failed. Last logs:"
            docker compose logs --tail=80 backend frontend caddy || true
            exit 1
          fi

          echo "Healthy:"
          cat /tmp/health.json

      - name: Stop containers
        if: always()
        run: |
          docker compose down