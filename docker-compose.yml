# App services only. Postgres and Redis are MANAGED CLOUD services now —
# configure them via DATABASE_URL and REDIS_URL in backend/.env. They are
# deliberately NOT run as containers here.
#
# Why the datastores moved off the box: running an on-instance Redis was the
# original attack vector behind the May 2026 AWS abuse cases (an exposed Redis
# on 6379 was used to drop a port-scanner). Using managed cloud datastores —
# with authentication, TLS, and an IP allowlist limited to this instance —
# removes that surface entirely.
#
# Reverse proxy / TLS (Caddy) lives in the server's docker-compose.override.yml;
# Caddy reaches these over the compose network via the service names
# `backend:8000` and `frontend:3000`.

services:
  backend:
    build: ./backend
    restart: unless-stopped
    # All secrets live here, never in git: DATABASE_URL + REDIS_URL (pointing at
    # the managed cloud Postgres/Redis), JWT_SECRET, CREDENTIAL_ENCRYPTION_KEY,
    # SNAPTRADE_CLIENT_ID/CONSUMER_KEY, etc. See app/config.py.
    env_file: ./backend/.env
    # Force IPv4 to the managed Neon Postgres. Neon's hostname resolves to both
    # AAAA (IPv6) and A (IPv4) records, with IPv6 first; but Lightsail instances
    # have no IPv6 egress, so the backend's getaddrinfo picks an IPv6 address and
    # every connect() returns "Network is unreachable", crash-looping the app and
    # surfacing as a 502 through Caddy. Disabling IPv6 inside the container makes
    # getaddrinfo return only the (reachable) A records.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    # Bound to localhost; Caddy (in the override) proxies to it over the
    # compose network. Nothing is exposed publicly except via Caddy on 80/443.
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      # Server-side proxy target inside the compose network (next.config.js
      # rewrites /api/* -> ${BACKEND_URL}/api/*).
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
